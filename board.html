<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자유게시판 - AircraftDB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 네비게이션 -->
<nav class="navbar" style="position:relative;">
  <a href="index.html" class="logo">✈️ <span>Aircraft</span>DB</a>
  <button class="hamburger" aria-label="메뉴">☰</button>
  <ul class="nav-links">
    <li><a href="index.html">홈</a></li>
    <li><a href="board.html" class="active">자유게시판</a></li>
    <li><a href="notice.html">공지사항</a></li>
    <li><a href="admin.html" class="nav-admin-btn">🔐 관리자</a></li>
  </ul>
</nav>

<!-- 페이지 헤더 -->
<div class="page-header">
  <h1>💬 자유게시판</h1>
  <p>항공기에 관한 이야기를 자유롭게 나눠보세요!</p>
</div>

<!-- 메인 콘텐츠 -->
<main class="container section">

  <!-- 목록 뷰 -->
  <div id="view-list">
    <div class="board-toolbar">
      <div class="board-search">
        <input type="text" id="search-input" placeholder="제목 또는 작성자 검색..." onkeydown="if(event.key==='Enter') searchPosts()">
        <button class="btn btn-outline" onclick="searchPosts()">🔍 검색</button>
        <button class="btn btn-outline" onclick="resetSearch()">초기화</button>
      </div>
      <button class="btn btn-primary" onclick="showView('write')">✏️ 글쓰기</button>
    </div>

    <div class="board-table-wrap">
      <table class="board-table">
        <thead>
          <tr>
            <th style="width:60px">번호</th>
            <th>제목</th>
            <th style="width:100px">작성자</th>
            <th style="width:110px">날짜</th>
            <th style="width:60px">조회</th>
          </tr>
        </thead>
        <tbody id="board-tbody">
          <tr><td colspan="5" style="text-align:center;padding:2rem;">
            <div class="loading"><div class="spinner"></div> 불러오는 중...</div>
          </td></tr>
        </tbody>
      </table>
    </div>

    <div id="pagination" class="pagination"></div>
  </div>

  <!-- 글쓰기 뷰 -->
  <div id="view-write" style="display:none;">
    <div style="margin-bottom:1rem;">
      <button class="btn btn-outline btn-sm" onclick="showView('list')">← 목록으로</button>
    </div>
    <div class="write-form">
      <h2 style="font-size:1.2rem;font-weight:800;color:var(--primary);margin-bottom:1.5rem;">✏️ 새 글 작성</h2>
      <div class="form-group">
        <label>작성자 *</label>
        <input class="form-control" id="write-author" placeholder="닉네임을 입력하세요" maxlength="20">
      </div>
      <div class="form-group">
        <label>비밀번호 * <span style="font-size:0.8rem;color:var(--text-light);font-weight:400">(글 수정/삭제 시 필요)</span></label>
        <input class="form-control" id="write-pw" type="password" placeholder="비밀번호 입력" maxlength="20">
      </div>
      <div class="form-group">
        <label>제목 *</label>
        <input class="form-control" id="write-title" placeholder="제목을 입력하세요" maxlength="100">
      </div>
      <div class="form-group">
        <label>내용 *</label>
        <textarea class="form-control" id="write-content" placeholder="내용을 입력하세요..." maxlength="5000"></textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn btn-outline" onclick="showView('list')">취소</button>
        <button class="btn btn-primary" onclick="submitPost()">📤 등록</button>
      </div>
    </div>
  </div>

  <!-- 글 보기 뷰 -->
  <div id="view-post" style="display:none;">
    <div style="margin-bottom:1rem;">
      <button class="btn btn-outline btn-sm" onclick="showView('list')">← 목록으로</button>
    </div>

    <div class="post-view">
      <div class="post-view-header">
        <div class="post-view-title" id="post-title"></div>
        <div class="post-view-meta">
          <span>✍️ <span id="post-author"></span></span>
          <span>🕒 <span id="post-date"></span></span>
          <span>👁️ <span id="post-views"></span>회</span>
        </div>
      </div>
      <div class="post-view-body" id="post-content"></div>
      <div class="post-view-actions">
        <button class="btn btn-outline btn-sm" onclick="promptDelete()">🗑️ 삭제</button>
      </div>
    </div>

    <!-- 댓글 -->
    <div class="comments-section">
      <div class="comments-header">💬 댓글 <span id="comment-count" style="color:var(--secondary);">0</span>개</div>
      <div id="comments-list"></div>
      <div class="comment-form">
        <div class="form-row">
          <input class="form-control" id="comment-author" placeholder="닉네임" maxlength="20" style="max-width:150px;">
          <input class="form-control" id="comment-pw" type="password" placeholder="비밀번호" maxlength="20" style="max-width:120px;">
        </div>
        <textarea class="form-control" id="comment-content" placeholder="댓글을 입력하세요..." maxlength="500" style="min-height:80px;margin-bottom:8px;"></textarea>
        <div style="display:flex;justify-content:flex-end;">
          <button class="btn btn-primary btn-sm" onclick="submitComment()">댓글 등록</button>
        </div>
      </div>
    </div>
  </div>

</main>

<!-- 삭제 확인 모달 -->
<div id="delete-modal" class="modal-overlay" style="display:none;" onclick="closeDeleteModal(event)">
  <div class="modal" style="max-width:400px;" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">🗑️ 삭제 확인</div>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:1rem;">비밀번호를 입력하면 글이 삭제됩니다.</p>
      <input class="form-control" id="delete-pw-input" type="password" placeholder="비밀번호">
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;">
        <button class="btn btn-outline" onclick="closeDeleteModal()">취소</button>
        <button class="btn btn-danger" onclick="confirmDelete()">삭제</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<footer>
  <p>✈️ AircraftDB &copy; 2025 · <a href="index.html">홈으로</a></p>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/common.js"></script>
<script>
const POSTS_PER_PAGE = 15;
let currentPage = 1;
let allPosts = [];
let filteredPosts = [];
let currentPostId = null;
let deleteTarget = { type: null, id: null, commentId: null };

// 뷰 전환
function showView(view) {
  ['list','write','post'].forEach(v => {
    document.getElementById(`view-${v}`).style.display = v === view ? 'block' : 'none';
  });
  if (view === 'list') loadPosts();
  window.scrollTo(0, 0);
}

// 게시글 로드
async function loadPosts() {
  const tbody = document.getElementById('board-tbody');
  tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:2rem;"><div class="loading"><div class="spinner"></div> 불러오는 중...</div></td></tr>';

  try {
    const snapshot = await db.collection('board')
      .orderBy('createdAt', 'desc')
      .get();

    allPosts = [];
    snapshot.forEach((doc, i) => {
      allPosts.push({ id: doc.id, ...doc.data() });
    });

    filteredPosts = [...allPosts];
    renderTable();
  } catch (e) {
    console.error(e);
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:red;padding:2rem;">데이터를 불러오지 못했습니다. Firebase 설정을 확인하세요.</td></tr>';
  }
}

function renderTable() {
  const tbody = document.getElementById('board-tbody');
  const total = filteredPosts.length;
  const start = (currentPage - 1) * POSTS_PER_PAGE;
  const end = Math.min(start + POSTS_PER_PAGE, total);
  const pagePosts = filteredPosts.slice(start, end);

  if (pagePosts.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">📭</div><p>게시글이 없습니다. 첫 번째 글을 작성해보세요!</p></div></td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const now = new Date();
  tbody.innerHTML = pagePosts.map((post, i) => {
    const num = total - start - i;
    const isNew = post.createdAt && (now - post.createdAt.toDate()) < 86400000;
    return `<tr>
      <td style="text-align:center;color:var(--text-light);font-size:0.85rem;">${num}</td>
      <td class="title-cell" onclick="openPost('${post.id}')">
        ${escapeHtml(post.title)}
        ${isNew ? '<span class="badge-new">N</span>' : ''}
      </td>
      <td>${escapeHtml(post.author || '익명')}</td>
      <td style="font-size:0.85rem;color:var(--text-light);">${formatDate(post.createdAt)}</td>
      <td style="text-align:center;font-size:0.85rem;color:var(--text-light);">${post.views || 0}</td>
    </tr>`;
  }).join('');

  renderPagination(total);
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / POSTS_PER_PAGE);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  let html = '';
  if (currentPage > 1) html += `<button class="page-btn" onclick="changePage(${currentPage-1})">‹</button>`;
  for (let p = Math.max(1, currentPage-2); p <= Math.min(totalPages, currentPage+2); p++) {
    html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="changePage(${p})">${p}</button>`;
  }
  if (currentPage < totalPages) html += `<button class="page-btn" onclick="changePage(${currentPage+1})">›</button>`;
  pag.innerHTML = html;
}

function changePage(p) {
  currentPage = p;
  renderTable();
  window.scrollTo(0, 0);
}

// 검색
function searchPosts() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  if (!q) { filteredPosts = [...allPosts]; }
  else {
    filteredPosts = allPosts.filter(p =>
      (p.title||'').toLowerCase().includes(q) ||
      (p.author||'').toLowerCase().includes(q)
    );
  }
  currentPage = 1;
  renderTable();
}

function resetSearch() {
  document.getElementById('search-input').value = '';
  filteredPosts = [...allPosts];
  currentPage = 1;
  renderTable();
}

// 글 열기
async function openPost(id) {
  currentPostId = id;
  try {
    // 조회수 증가
    const ref = db.collection('board').doc(id);
    await ref.update({ views: firebase.firestore.FieldValue.increment(1) });
    const doc = await ref.get();
    if (!doc.exists) return;

    const data = doc.data();
    document.getElementById('post-title').textContent = data.title || '';
    document.getElementById('post-author').textContent = data.author || '익명';
    document.getElementById('post-date').textContent = formatDate(data.createdAt);
    document.getElementById('post-views').textContent = (data.views || 0);
    document.getElementById('post-content').textContent = data.content || '';

    showView('post');
    loadComments(id);
  } catch (e) {
    showToast('글을 불러오지 못했습니다.', 'error');
  }
}

// 글 작성
async function submitPost() {
  const author = document.getElementById('write-author').value.trim();
  const pw = document.getElementById('write-pw').value;
  const title = document.getElementById('write-title').value.trim();
  const content = document.getElementById('write-content').value.trim();

  if (!author) return showToast('작성자를 입력하세요.', 'error');
  if (!pw) return showToast('비밀번호를 입력하세요.', 'error');
  if (!title) return showToast('제목을 입력하세요.', 'error');
  if (!content) return showToast('내용을 입력하세요.', 'error');

  try {
    await db.collection('board').add({
      title, author, content,
      password: btoa(pw), // 간단 인코딩
      views: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById('write-author').value = '';
    document.getElementById('write-pw').value = '';
    document.getElementById('write-title').value = '';
    document.getElementById('write-content').value = '';

    showToast('글이 등록되었습니다!', 'success');
    showView('list');
  } catch (e) {
    showToast('등록에 실패했습니다.', 'error');
  }
}

// 삭제
function promptDelete() {
  deleteTarget = { type: 'post', id: currentPostId };
  document.getElementById('delete-pw-input').value = '';
  document.getElementById('delete-modal').style.display = 'flex';
}

function closeDeleteModal(e) {
  if (e && e.target !== document.getElementById('delete-modal')) return;
  document.getElementById('delete-modal').style.display = 'none';
}

async function confirmDelete() {
  const pw = document.getElementById('delete-pw-input').value;
  if (!pw) return showToast('비밀번호를 입력하세요.', 'error');

  try {
    if (deleteTarget.type === 'post') {
      const doc = await db.collection('board').doc(deleteTarget.id).get();
      if (!doc.exists) return;
      const data = doc.data();

      // 관리자이거나 비밀번호 일치 시
      if (isAdminLoggedIn() || data.password === btoa(pw)) {
        await db.collection('board').doc(deleteTarget.id).delete();
        document.getElementById('delete-modal').style.display = 'none';
        showToast('삭제되었습니다.', 'success');
        showView('list');
      } else {
        showToast('비밀번호가 틀렸습니다.', 'error');
      }
    } else if (deleteTarget.type === 'comment') {
      const ref = db.collection('board').doc(deleteTarget.id)
        .collection('comments').doc(deleteTarget.commentId);
      const doc = await ref.get();
      if (!doc.exists) return;

      if (isAdminLoggedIn() || doc.data().password === btoa(pw)) {
        await ref.delete();
        document.getElementById('delete-modal').style.display = 'none';
        showToast('댓글이 삭제되었습니다.', 'success');
        loadComments(deleteTarget.id);
      } else {
        showToast('비밀번호가 틀렸습니다.', 'error');
      }
    }
  } catch (e) {
    showToast('삭제에 실패했습니다.', 'error');
  }
}

// 댓글
async function loadComments(postId) {
  const list = document.getElementById('comments-list');
  try {
    const snapshot = await db.collection('board').doc(postId)
      .collection('comments').orderBy('createdAt', 'asc').get();

    const comments = [];
    snapshot.forEach(doc => comments.push({ id: doc.id, ...doc.data() }));

    document.getElementById('comment-count').textContent = comments.length;

    if (comments.length === 0) {
      list.innerHTML = '<div style="padding:1rem 1.5rem;color:var(--text-light);font-size:0.9rem;">첫 댓글을 남겨보세요!</div>';
      return;
    }

    list.innerHTML = comments.map(c => `
      <div class="comment-item">
        <div class="comment-meta">
          <span><span class="comment-author">✍️ ${escapeHtml(c.author||'익명')}</span>
          <span style="margin-left:8px;">${formatDate(c.createdAt)}</span></span>
          <button class="btn btn-danger btn-sm" onclick="promptDeleteComment('${postId}','${c.id}')">삭제</button>
        </div>
        <div class="comment-text">${escapeHtml(c.content||'')}</div>
      </div>
    `).join('');
  } catch (e) {
    list.innerHTML = '<div style="padding:1rem 1.5rem;color:red;">댓글을 불러오지 못했습니다.</div>';
  }
}

async function submitComment() {
  const author = document.getElementById('comment-author').value.trim();
  const pw = document.getElementById('comment-pw').value;
  const content = document.getElementById('comment-content').value.trim();

  if (!author) return showToast('닉네임을 입력하세요.', 'error');
  if (!pw) return showToast('비밀번호를 입력하세요.', 'error');
  if (!content) return showToast('댓글 내용을 입력하세요.', 'error');

  try {
    await db.collection('board').doc(currentPostId)
      .collection('comments').add({
        author, content,
        password: btoa(pw),
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

    document.getElementById('comment-author').value = '';
    document.getElementById('comment-pw').value = '';
    document.getElementById('comment-content').value = '';

    showToast('댓글이 등록되었습니다.', 'success');
    loadComments(currentPostId);
  } catch (e) {
    showToast('댓글 등록에 실패했습니다.', 'error');
  }
}

function promptDeleteComment(postId, commentId) {
  deleteTarget = { type: 'comment', id: postId, commentId };
  document.getElementById('delete-pw-input').value = '';
  document.getElementById('delete-modal').style.display = 'flex';
}

// 초기 로드
loadPosts();
</script>
</body>
</html>
