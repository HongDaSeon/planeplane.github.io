<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✈️ AircraftDB - 항공기 백과사전</title>
  <meta name="description" content="전투기, 여객기, 화물기, 헬리콥터 등 다양한 항공기의 종류와 특징을 알아보세요.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 네비게이션 -->
<nav class="navbar" style="position:relative;">
  <a href="index.html" class="logo">✈️ <span>Aircraft</span>DB</a>
  <button class="hamburger" aria-label="메뉴">☰</button>
  <ul class="nav-links">
    <li><a href="index.html" class="active">홈</a></li>
    <li><a href="board.html">자유게시판</a></li>
    <li><a href="notice.html">공지사항</a></li>
    <li><a href="admin.html" class="nav-admin-btn">🔐 관리자</a></li>
  </ul>
</nav>

<!-- 히어로 -->
<section class="hero">
  <h1>✈️ 항공기 백과사전</h1>
  <p>전투기부터 여객기, 화물기, 헬리콥터까지<br>다양한 항공기의 세계를 탐험해보세요.</p>
</section>

<!-- 항공기 목록 -->
<main class="container section">
  <div class="section-title">🛫 항공기 종류</div>
  <p class="section-subtitle">각 카드를 클릭하면 상세 정보를 확인할 수 있습니다.</p>

  <div id="aircraft-grid" class="aircraft-grid">
    <div class="loading">
      <div class="spinner"></div>
      <span>항공기 정보 불러오는 중...</span>
    </div>
  </div>
</main>

<!-- 모달 -->
<div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <div id="modal-category" style="font-size:0.8rem;opacity:0.7;margin-bottom:4px;"></div>
        <div class="modal-title" id="modal-title"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast-container" class="toast-container"></div>

<!-- 푸터 -->
<footer>
  <p>✈️ AircraftDB &copy; 2025 · 항공기 백과사전 · <a href="admin.html">관리자</a></p>
</footer>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/common.js"></script>
<script>
// 항공기 카드 렌더링
const ORDER = ['fighter','commercial','cargo','military','helicopter','supersonic'];

async function loadAircraftCards() {
  const grid = document.getElementById('aircraft-grid');

  try {
    const snapshot = await db.collection('site_contents').get();

    if (snapshot.empty) {
      // 데이터가 없으면 초기화
      await initFirestoreData();
      return loadAircraftCards();
    }

    const data = {};
    snapshot.forEach(doc => {
      data[doc.id] = { id: doc.id, ...doc.data() };
    });

    // 순서대로 정렬
    const items = ORDER.map(id => data[id]).filter(Boolean);
    // 정의되지 않은 항목도 추가
    Object.values(data).forEach(item => {
      if (!ORDER.includes(item.id)) items.push(item);
    });

    grid.innerHTML = items.map(item => `
      <div class="aircraft-card" onclick="openModal('${item.id}')">
        <div class="aircraft-card-img">
          <span style="font-size:5rem;">${item.emoji || '✈️'}</span>
        </div>
        <div class="aircraft-card-body">
          <div class="aircraft-card-category">${item.category || ''}</div>
          <div class="aircraft-card-title">${escapeHtml(item.title)}</div>
          <div class="aircraft-card-desc">${escapeHtml(item.summary || '')}</div>
        </div>
        <div class="aircraft-card-footer">
          <span class="btn-read-more">자세히 보기 →</span>
        </div>
      </div>
    `).join('');

  } catch (e) {
    console.error(e);
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <p>데이터를 불러오지 못했습니다.<br>Firebase 설정을 확인해주세요.</p>
    </div>`;
  }
}

// 모달 열기
async function openModal(id) {
  try {
    const doc = await db.collection('site_contents').doc(id).get();
    if (!doc.exists) return;

    const data = doc.data();
    document.getElementById('modal-category').textContent = data.category || '';
    document.getElementById('modal-title').textContent = `${data.emoji || '✈️'} ${data.title}`;
    document.getElementById('modal-body').innerHTML = renderMarkdown(data.content || data.summary || '');
    document.getElementById('modal-overlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  } catch (e) {
    showToast('정보를 불러오지 못했습니다.', 'error');
  }
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('modal-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

// ESC 키로 모달 닫기
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal({ target: document.getElementById('modal-overlay') });
});

loadAircraftCards();
</script>
</body>
</html>
