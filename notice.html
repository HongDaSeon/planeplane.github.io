<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 - AircraftDB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 네비게이션 -->
<nav class="navbar" style="position:relative;">
  <a href="index.html" class="logo">✈️ <span>Aircraft</span>DB</a>
  <button class="hamburger" aria-label="메뉴">☰</button>
  <ul class="nav-links">
    <li><a href="index.html">홈</a></li>
    <li><a href="board.html">자유게시판</a></li>
    <li><a href="notice.html" class="active">공지사항</a></li>
    <li><a href="admin.html" class="nav-admin-btn">🔐 관리자</a></li>
  </ul>
</nav>

<!-- 페이지 헤더 -->
<div class="page-header" style="background: linear-gradient(135deg,#c0392b,#e74c3c);">
  <h1>📢 공지사항</h1>
  <p>관리자가 전달하는 중요한 공지를 확인하세요.</p>
</div>

<!-- 메인 콘텐츠 -->
<main class="container section">

  <!-- 목록 뷰 -->
  <div id="view-list">
    <div class="board-toolbar">
      <div class="board-search">
        <input type="text" id="search-input" placeholder="공지 제목 검색..." onkeydown="if(event.key==='Enter') searchPosts()">
        <button class="btn btn-outline" onclick="searchPosts()">🔍 검색</button>
        <button class="btn btn-outline" onclick="resetSearch()">초기화</button>
      </div>
      <!-- 관리자만 글쓰기 버튼 표시 -->
      <div id="write-btn-wrap" style="display:none;">
        <button class="btn btn-danger" onclick="showView('write')">📢 공지 작성</button>
      </div>
    </div>

    <div id="notice-info" style="background:#fff8f8;border:1px solid #f5c6cb;border-radius:8px;padding:10px 16px;margin-bottom:1rem;font-size:0.88rem;color:#c0392b;display:flex;align-items:center;gap:8px;">
      🔒 공지사항은 관리자만 작성할 수 있습니다. 관리자로 로그인하면 글쓰기 버튼이 표시됩니다.
    </div>

    <div class="board-table-wrap">
      <table class="board-table">
        <thead>
          <tr>
            <th style="width:60px">번호</th>
            <th>제목</th>
            <th style="width:110px">날짜</th>
            <th style="width:60px">조회</th>
          </tr>
        </thead>
        <tbody id="notice-tbody">
          <tr><td colspan="4" style="text-align:center;padding:2rem;">
            <div class="loading"><div class="spinner"></div> 불러오는 중...</div>
          </td></tr>
        </tbody>
      </table>
    </div>

    <div id="pagination" class="pagination"></div>
  </div>

  <!-- 글쓰기 뷰 (관리자 전용) -->
  <div id="view-write" style="display:none;">
    <div style="margin-bottom:1rem;">
      <button class="btn btn-outline btn-sm" onclick="showView('list')">← 목록으로</button>
    </div>
    <div class="write-form">
      <h2 style="font-size:1.2rem;font-weight:800;color:var(--danger);margin-bottom:1.5rem;">📢 공지사항 작성 <span style="font-size:0.85rem;font-weight:400;color:var(--text-light)">(관리자 전용)</span></h2>
      <div class="form-group">
        <label>제목 *</label>
        <input class="form-control" id="write-title" placeholder="공지 제목을 입력하세요" maxlength="100">
      </div>
      <div class="form-group">
        <label>내용 *</label>
        <textarea class="form-control" id="write-content" placeholder="공지 내용을 입력하세요..." maxlength="10000"></textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn btn-outline" onclick="showView('list')">취소</button>
        <button class="btn btn-danger" onclick="submitNotice()">📢 공지 등록</button>
      </div>
    </div>
  </div>

  <!-- 글 보기 뷰 -->
  <div id="view-post" style="display:none;">
    <div style="margin-bottom:1rem;">
      <button class="btn btn-outline btn-sm" onclick="showView('list')">← 목록으로</button>
    </div>

    <div class="post-view">
      <div class="post-view-header" style="background:linear-gradient(135deg,#fff5f5,#fff);">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span class="badge-notice">공지</span>
          <div class="post-view-title" id="post-title"></div>
        </div>
        <div class="post-view-meta">
          <span>✍️ 관리자</span>
          <span>🕒 <span id="post-date"></span></span>
          <span>👁️ <span id="post-views"></span>회</span>
        </div>
      </div>
      <div class="post-view-body" id="post-content"></div>
      <div class="post-view-actions" id="admin-post-actions" style="display:none;">
        <button class="btn btn-danger btn-sm" onclick="deleteCurrentNotice()">🗑️ 삭제</button>
      </div>
    </div>
  </div>

</main>

<div id="toast-container" class="toast-container"></div>

<footer>
  <p>✈️ AircraftDB &copy; 2025 · <a href="index.html">홈으로</a></p>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/common.js"></script>
<script>
const POSTS_PER_PAGE = 15;
let currentPage = 1;
let allPosts = [];
let filteredPosts = [];
let currentPostId = null;

// 관리자 상태에 따라 UI 업데이트
function updateAdminUI() {
  const isAdmin = isAdminLoggedIn();
  document.getElementById('write-btn-wrap').style.display = isAdmin ? 'block' : 'none';
  document.getElementById('notice-info').style.display = isAdmin ? 'none' : 'flex';
}

// 뷰 전환
function showView(view) {
  ['list','write','post'].forEach(v => {
    document.getElementById(`view-${v}`).style.display = v === view ? 'block' : 'none';
  });
  if (view === 'list') loadPosts();
  if (view === 'write' && !isAdminLoggedIn()) {
    showToast('관리자만 공지를 작성할 수 있습니다.', 'error');
    showView('list');
    return;
  }
  window.scrollTo(0, 0);
}

// 공지 로드
async function loadPosts() {
  const tbody = document.getElementById('notice-tbody');
  tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:2rem;"><div class="loading"><div class="spinner"></div> 불러오는 중...</div></td></tr>';

  try {
    const snapshot = await db.collection('notice')
      .orderBy('createdAt', 'desc')
      .get();

    allPosts = [];
    snapshot.forEach(doc => {
      allPosts.push({ id: doc.id, ...doc.data() });
    });

    filteredPosts = [...allPosts];
    renderTable();
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:red;padding:2rem;">데이터를 불러오지 못했습니다.</td></tr>';
  }
}

function renderTable() {
  const tbody = document.getElementById('notice-tbody');
  const total = filteredPosts.length;
  const start = (currentPage - 1) * POSTS_PER_PAGE;
  const pagePosts = filteredPosts.slice(start, start + POSTS_PER_PAGE);

  if (pagePosts.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">📭</div><p>등록된 공지사항이 없습니다.</p></div></td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const now = new Date();
  tbody.innerHTML = pagePosts.map((post, i) => {
    const num = total - start - i;
    const isNew = post.createdAt && (now - post.createdAt.toDate()) < 86400000;
    return `<tr>
      <td style="text-align:center;">
        <span class="badge-notice" style="font-size:0.68rem;">공지</span>
      </td>
      <td class="title-cell" onclick="openPost('${post.id}')">
        ${escapeHtml(post.title)}
        ${isNew ? '<span class="badge-new">N</span>' : ''}
      </td>
      <td style="font-size:0.85rem;color:var(--text-light);">${formatDate(post.createdAt)}</td>
      <td style="text-align:center;font-size:0.85rem;color:var(--text-light);">${post.views || 0}</td>
    </tr>`;
  }).join('');

  renderPagination(total);
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / POSTS_PER_PAGE);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  let html = '';
  if (currentPage > 1) html += `<button class="page-btn" onclick="changePage(${currentPage-1})">‹</button>`;
  for (let p = Math.max(1, currentPage-2); p <= Math.min(totalPages, currentPage+2); p++) {
    html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="changePage(${p})">${p}</button>`;
  }
  if (currentPage < totalPages) html += `<button class="page-btn" onclick="changePage(${currentPage+1})">›</button>`;
  pag.innerHTML = html;
}

function changePage(p) {
  currentPage = p;
  renderTable();
  window.scrollTo(0, 0);
}

function searchPosts() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  filteredPosts = q ? allPosts.filter(p => (p.title||'').toLowerCase().includes(q)) : [...allPosts];
  currentPage = 1;
  renderTable();
}

function resetSearch() {
  document.getElementById('search-input').value = '';
  filteredPosts = [...allPosts];
  currentPage = 1;
  renderTable();
}

// 공지 열기
async function openPost(id) {
  currentPostId = id;
  try {
    const ref = db.collection('notice').doc(id);
    await ref.update({ views: firebase.firestore.FieldValue.increment(1) });
    const doc = await ref.get();
    if (!doc.exists) return;

    const data = doc.data();
    document.getElementById('post-title').textContent = data.title || '';
    document.getElementById('post-date').textContent = formatDate(data.createdAt);
    document.getElementById('post-views').textContent = data.views || 0;
    document.getElementById('post-content').textContent = data.content || '';

    // 관리자 액션 버튼
    document.getElementById('admin-post-actions').style.display = isAdminLoggedIn() ? 'flex' : 'none';

    showView('post');
  } catch (e) {
    showToast('공지를 불러오지 못했습니다.', 'error');
  }
}

// 공지 작성 (관리자 전용)
async function submitNotice() {
  if (!isAdminLoggedIn()) return showToast('권한이 없습니다.', 'error');

  const title = document.getElementById('write-title').value.trim();
  const content = document.getElementById('write-content').value.trim();

  if (!title) return showToast('제목을 입력하세요.', 'error');
  if (!content) return showToast('내용을 입력하세요.', 'error');

  try {
    await db.collection('notice').add({
      title, content,
      author: 'admin',
      views: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById('write-title').value = '';
    document.getElementById('write-content').value = '';
    showToast('공지가 등록되었습니다!', 'success');
    showView('list');
  } catch (e) {
    showToast('등록에 실패했습니다.', 'error');
  }
}

// 공지 삭제 (관리자 전용)
async function deleteCurrentNotice() {
  if (!isAdminLoggedIn()) return;
  if (!confirm('이 공지사항을 삭제하시겠습니까?')) return;
  try {
    await db.collection('notice').doc(currentPostId).delete();
    showToast('삭제되었습니다.', 'success');
    showView('list');
  } catch (e) {
    showToast('삭제에 실패했습니다.', 'error');
  }
}

// 초기화
updateAdminUI();
loadPosts();
</script>
</body>
</html>
